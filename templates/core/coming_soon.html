{% extends "base.html" %}
{% block title %}Coming soon — Taxon AI{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-8 py-16 text-center">
  <div class="max-w-md">
    <i data-lucide="hourglass" class="w-8 h-8 accent-text mx-auto mb-4"></i>
    <h1 class="text-xl font-bold mb-2">Coming soon</h1>
    <p class="text-sm text-neutral-500 mb-8">
      This isn't live yet. Join our waitlist by contacting sales and we'll
      reach out the moment it's ready.
    </p>
    <div class="flex items-center justify-center gap-3 flex-wrap">
      <a href="{% url 'core:home' %}#contact-sales" class="inline-flex items-center gap-2 text-sm font-medium px-5 py-2.5 rounded-full bg-neutral-900 text-white dark:bg-white dark:text-black hover:opacity-90 transition-opacity">
        <i data-lucide="phone-call" class="w-4 h-4"></i> Join the waitlist
      </a>
      <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 text-sm font-medium px-5 py-2.5 rounded-full border border-neutral-200 dark:border-neutral-800 hover:bg-neutral-100 dark:hover:bg-neutral-900 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to home
      </a>
    </div>
  </div>
</div>
{% endblock %}
