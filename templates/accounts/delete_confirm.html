{% extends "base.html" %}
{% block title %}Delete account — Taxon AI{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-8 py-16">
  <div class="w-full max-w-sm text-center">
    <i data-lucide="alert-triangle" class="w-8 h-8 text-rose-500 mx-auto mb-4"></i>
    <h1 class="text-xl font-bold mb-2">Delete your account?</h1>
    <p class="text-sm text-neutral-500 mb-8">
      This permanently deletes your profile, resume, and photo, and signs you out. This can't be undone.
    </p>
    <form method="post" class="flex items-center justify-center gap-3">
      {% csrf_token %}
      <button type="submit" class="text-sm font-medium px-4 py-2 rounded-full bg-rose-500 text-white hover:bg-rose-600 transition-colors">
        Yes, permanently delete
      </button>
      <a href="{% url 'accounts:account' %}" class="text-sm text-neutral-500 hover:text-neutral-900 dark:hover:text-white transition-colors">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
